<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kids Running</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏃</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

    .page-header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .page-header h1 { font-size: 1.4rem; font-weight: 700; color: #f1f5f9; }
    .sync-meta { flex: 1; font-size: 0.8rem; color: #64748b; }

    .btn-sync {
      background: #3b82f6;
      color: #fff;
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: background 0.15s;
    }
    .btn-sync:hover { background: #2563eb; }
    .btn-sync:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

    .content { padding: 2rem; max-width: 1100px; margin: 0 auto; }

    .athlete-block { margin-bottom: 2.5rem; }
    .athlete-heading {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .athlete-heading h2 { font-size: 1.2rem; font-weight: 700; color: #f1f5f9; }
    .badge-pr-count {
      background: #f59e0b;
      color: #1a1a1a;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
    }
    .result-count { color: #64748b; font-size: 0.82rem; }

    .filter-tabs { display: flex; gap: 0.4rem; margin-bottom: 0.9rem; flex-wrap: wrap; }
    .ftab {
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.78rem;
      transition: all 0.12s;
    }
    .ftab:hover { border-color: #3b82f6; color: #e2e8f0; }
    .ftab.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }

    .chart-wrap {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .chart-legend {
      display: flex;
      gap: 1.25rem;
      margin-bottom: 0.75rem;
      font-size: 0.75rem;
      color: #64748b;
    }
    .chart-legend span { display: flex; align-items: center; gap: 0.35rem; }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .dot-blue { background: #3b82f6; }
    .dot-gold { background: #f59e0b; }

    .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid #334155; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th {
      background: #1e293b;
      color: #94a3b8;
      font-weight: 600;
      text-align: left;
      padding: 0.65rem 1rem;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    td { padding: 0.65rem 1rem; border-top: 1px solid #1e293b; color: #cbd5e1; vertical-align: middle; }
    tr:hover td { background: rgba(30,41,59,0.5); }

    .mark { font-weight: 600; color: #f1f5f9; font-variant-numeric: tabular-nums; }
    .badge-pr {
      background: rgba(245,158,11,0.15);
      color: #f59e0b;
      border: 1px solid rgba(245,158,11,0.3);
      font-size: 0.68rem;
      font-weight: 700;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      margin-left: 0.4rem;
    }
    .badge-relay {
      background: rgba(139,92,246,0.15);
      color: #a78bfa;
      border: 1px solid rgba(139,92,246,0.3);
      font-size: 0.68rem;
      font-weight: 700;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      margin-left: 0.4rem;
    }
    .p1 { color: #f59e0b; font-weight: 700; }
    .p2 { color: #94a3b8; font-weight: 600; }
    .p3 { color: #b45309; font-weight: 600; }

    .divider { border: none; border-top: 1px solid #1e293b; margin: 2rem 0; }
    .empty { text-align: center; color: #475569; padding: 2.5rem 1rem; font-size: 0.9rem; }
  </style>
</head>
<body>

<div class="page-header">
  <h1>🏃 Kids Running</h1>
  <span class="sync-meta" id="sync-meta">Loading…</span>
  <button class="btn-sync" id="sync-btn" onclick="syncNow()">Sync SportTrax</button>
  <button class="btn-sync" id="sync-anet-btn" onclick="syncAthleticNet()" style="background:#7c3aed">Sync Athletic.net</button>
  <button class="btn-sync" id="delete-btn" onclick="deleteAllResults()" style="background:#dc2626">Delete All Results</button>
  <span style="font-size:0.72rem;color:#475569">v2026.04.18.17</span>
</div>

<div class="content" id="content">
  <div class="empty">Loading results…</div>
</div>

<script>
const SUPABASE_URL = 'https://ebdsxcbpnhevzkbpdxry.supabase.co'
const SUPABASE_ANON_KEY = 'sb_publishable_2chleZ28vhYAQqpW0RaNeg_0DYo_1v4'
const SYNC_URL = `${SUPABASE_URL}/functions/v1/sync-sporttrax`
const SYNC_ANET_URL = `${SUPABASE_URL}/functions/v1/sync-athleticnet`

const { createClient } = supabase
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

const FILTERS = ['All', '100m', '200m', '400m', '800m', '4x100', '4x200', '4x400', '4x800']
const activeFilter = {}
const activeYear = {}
const chartInstances = {}

// Parse "50.19" or "1:52.34" into total seconds
function parseTime(mark) {
  if (!mark) return null
  if (mark.includes(':')) {
    const [min, sec] = mark.split(':')
    return parseFloat(min) * 60 + parseFloat(sec)
  }
  return parseFloat(mark)
}

// Format seconds back to "50.19" or "1:52.34"
function fmtTime(secs) {
  if (secs == null || isNaN(secs)) return '—'
  if (secs >= 60) {
    const min = Math.floor(secs / 60)
    const sec = (secs % 60).toFixed(2).padStart(5, '0')
    return `${min}:${sec}`
  }
  return secs.toFixed(2)
}

async function load() {
  const { data: athletes } = await db.from('kids_athletes').select('*').order('name')
  const { data: results } = await db.from('kids_results').select('*').order('race_date', { ascending: false })

  const content = document.getElementById('content')

  if (!athletes?.length) {
    content.innerHTML = '<div class="empty">No data yet — click <strong>Sync SportTrax</strong> to load results.</div>'
    document.getElementById('sync-meta').textContent = 'No data yet'
    return
  }

  const byAthlete = {}
  for (const a of athletes) byAthlete[a.id] = { ...a, results: [] }
  for (const r of results ?? []) {
    if (byAthlete[r.athlete_id]) byAthlete[r.athlete_id].results.push(r)
  }

  content.innerHTML = ''
  const list = Object.values(byAthlete)
  list.forEach((a, i) => {
    content.appendChild(buildBlock(a))
    if (i < list.length - 1) {
      const hr = document.createElement('hr')
      hr.className = 'divider'
      content.appendChild(hr)
    }
  })

  const all = results ?? []
  const total = all.length
  const fromST = all.filter(r => r.sporttrax_result_id != null).length
  const fromAN = all.filter(r => r.athleticnet_result_id != null).length
  const newest = all[0]?.created_at
  const sourceParts = [
    fromST ? `SportTrax: ${fromST}` : '',
    fromAN ? `Athletic.net: ${fromAN}` : '',
  ].filter(Boolean).join(' · ')
  const dateStr = newest ? new Date(newest).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : null
  document.getElementById('sync-meta').textContent = dateStr
    ? `${total} results (${sourceParts}) · last synced ${dateStr}`
    : total ? `${total} results (${sourceParts})` : 'No data yet'
}

function buildBlock(athlete) {
  activeFilter[athlete.id] = activeFilter[athlete.id] || 'All'
  activeYear[athlete.id] = activeYear[athlete.id] || 'All'
  const prCount = athlete.results.filter(r => r.is_pr).length

  const block = document.createElement('div')
  block.className = 'athlete-block'
  block.innerHTML = `
    <div class="athlete-heading">
      <h2>${athlete.name}</h2>
      ${prCount ? `<span class="badge-pr-count">⚡ ${prCount} PR${prCount !== 1 ? 's' : ''}</span>` : ''}
      <span class="result-count">${athlete.results.length} result${athlete.results.length !== 1 ? 's' : ''}</span>
    </div>
    <div class="filter-tabs" id="tabs-${athlete.id}"></div>
    <div class="filter-tabs" id="year-tabs-${athlete.id}" style="margin-top:-0.4rem"></div>
    <div id="view-${athlete.id}"></div>
  `

  const tabsEl = block.querySelector(`#tabs-${athlete.id}`)
  FILTERS.forEach(f => {
    const btn = document.createElement('button')
    btn.className = 'ftab' + (f === activeFilter[athlete.id] ? ' active' : '')
    btn.textContent = f
    btn.onclick = () => {
      activeFilter[athlete.id] = f
      activeYear[athlete.id] = 'All'
      tabsEl.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'))
      btn.classList.add('active')
      renderYearTabs(athlete, block)
      renderView(athlete, block.querySelector(`#view-${athlete.id}`))
    }
    tabsEl.appendChild(btn)
  })

  renderYearTabs(athlete, block)
  renderView(athlete, block.querySelector(`#view-${athlete.id}`))
  return block
}

function renderYearTabs(athlete, block) {
  const yearTabsEl = block.querySelector(`#year-tabs-${athlete.id}`)
  const f = activeFilter[athlete.id]
  yearTabsEl.innerHTML = ''
  if (f === 'All') return

  const eventRows = applyFilter(athlete.results, f)
  const years = [...new Set(eventRows.map(r => r.race_date?.slice(0, 4)).filter(Boolean))].sort((a, b) => b - a)
  if (years.length <= 1) return

  const allYears = ['All', ...years]
  allYears.forEach(y => {
    const btn = document.createElement('button')
    btn.className = 'ftab' + (y === activeYear[athlete.id] ? ' active' : '')
    btn.style.fontSize = '0.72rem'
    btn.textContent = y === 'All' ? 'All Years' : y
    btn.onclick = () => {
      activeYear[athlete.id] = y
      yearTabsEl.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'))
      btn.classList.add('active')
      renderView(athlete, block.querySelector(`#view-${athlete.id}`))
    }
    yearTabsEl.appendChild(btn)
  })
}

function applyFilter(results, f) {
  if (f === 'All') return results
  if (f.startsWith('4x')) return results.filter(r => r.event_name?.match(new RegExp(f, 'i')))
  return results.filter(r => r.event_name?.match(new RegExp(`^${f}`, 'i')))
}

function renderView(athlete, container) {
  const f = activeFilter[athlete.id]
  const y = activeYear[athlete.id] || 'All'
  let rows = applyFilter(athlete.results, f)
  if (y !== 'All') rows = rows.filter(r => r.race_date?.startsWith(y))
  const canvasId = `chart-${athlete.id}`
  const showChart = f !== 'All'

  // Destroy old chart
  if (chartInstances[canvasId]) {
    chartInstances[canvasId].destroy()
    delete chartInstances[canvasId]
  }

  if (!rows.length) {
    container.innerHTML = '<div class="empty">No results for this filter.</div>'
    return
  }

  // Build chart HTML + table HTML
  const chartHtml = showChart ? `
    <div class="chart-wrap">
      <div class="chart-legend">
        <span><span class="dot dot-blue"></span> Race time</span>
        <span><span class="dot dot-gold"></span> Personal record</span>
      </div>
      <canvas id="${canvasId}" height="120"></canvas>
    </div>` : ''

  container.innerHTML = chartHtml + `
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Date</th><th>Meet</th><th>Event</th><th>Mark</th><th>Place</th>
        </tr></thead>
        <tbody>
          ${rows.map(r => `<tr>
            <td>${fmtDate(r.race_date)}</td>
            <td>${r.meet_name || '—'}</td>
            <td>${r.event_name || '—'}${r.is_relay ? '<span class="badge-relay">RELAY</span>' : ''}</td>
            <td><span class="mark">${r.mark || '—'}</span>${r.is_pr ? '<span class="badge-pr">PR</span>' : ''}</td>
            <td>${placeHtml(r.place)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`

  if (showChart) {
    const sorted = [...rows]
      .filter(r => r.race_date && parseTime(r.mark) !== null)
      .sort((a, b) => a.race_date.localeCompare(b.race_date))

    if (sorted.length >= 2) {
      const labels = sorted.map(r => fmtDate(r.race_date))
      const times = sorted.map(r => parseTime(r.mark))
      const prFlags = sorted.map(r => r.is_pr)

      const ctx = container.querySelector('#' + canvasId).getContext('2d')
      chartInstances[canvasId] = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data: times,
            borderColor: '#3b82f6',
            backgroundColor: 'rgba(59,130,246,0.08)',
            borderWidth: 2,
            pointBackgroundColor: prFlags.map(p => p ? '#f59e0b' : '#3b82f6'),
            pointBorderColor: prFlags.map(p => p ? '#f59e0b' : '#3b82f6'),
            pointRadius: prFlags.map(p => p ? 7 : 5),
            pointHoverRadius: 8,
            tension: 0.25,
            fill: true,
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                title: (items) => labels[items[0].dataIndex],
                label: (item) => {
                  const pr = prFlags[item.dataIndex] ? ' ⚡ PR' : ''
                  return `  ${fmtTime(item.raw)}${pr}`
                }
              },
              backgroundColor: '#1e293b',
              titleColor: '#94a3b8',
              bodyColor: '#f1f5f9',
              borderColor: '#334155',
              borderWidth: 1,
            }
          },
          scales: {
            x: {
              grid: { color: '#1e293b' },
              ticks: { color: '#64748b', font: { size: 11 }, maxRotation: 30 }
            },
            y: {
              reverse: true,
              grid: { color: '#334155' },
              ticks: {
                color: '#64748b',
                font: { size: 11 },
                callback: (v) => fmtTime(v)
              }
            }
          }
        }
      })
    }
  }
}

function placeHtml(p) {
  if (!p) return '—'
  const cls = p === 1 ? 'p1' : p === 2 ? 'p2' : p === 3 ? 'p3' : ''
  const sfx = p === 1 ? 'st' : p === 2 ? 'nd' : p === 3 ? 'rd' : 'th'
  return cls ? `<span class="${cls}">${p}${sfx}</span>` : `${p}${sfx}`
}

function fmtDate(d) {
  if (!d) return '—'
  return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
}

async function syncNow() {
  const btn = document.getElementById('sync-btn')
  const meta = document.getElementById('sync-meta')
  btn.disabled = true
  btn.textContent = 'Syncing…'
  meta.textContent = 'Fetching from SportTrax…'
  try {
    const resp = await fetch(SYNC_URL, {
      method: 'POST',
      headers: { Authorization: `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
    })
    const json = await resp.json()
    if (json.ok) {
      meta.textContent = 'Sync complete — reloading…'
      await load()
    } else {
      meta.textContent = 'Sync error — check console'
      console.error(json)
    }
  } catch (e) {
    meta.textContent = 'Sync failed: ' + e.message
  } finally {
    btn.disabled = false
    btn.textContent = 'Sync from SportTrax'
  }
}

async function deleteAllResults() {
  const pwd = prompt('Enter password to delete all results:')
  if (pwd !== 'DeleteTrackResultsHarmon') {
    alert('Incorrect password.')
    return
  }
  if (!confirm('Delete ALL results from the database? This cannot be undone.')) return
  const btn = document.getElementById('delete-btn')
  const meta = document.getElementById('sync-meta')
  btn.disabled = true
  btn.textContent = 'Deleting…'
  meta.textContent = 'Deleting all results…'
  try {
    const { error } = await db.from('kids_results').delete().gte('id', 0)
    if (error) {
      meta.textContent = 'Delete failed — check console'
      console.error(error)
    } else {
      meta.textContent = 'All results deleted.'
      await load()
    }
  } catch (e) {
    meta.textContent = 'Delete failed: ' + e.message
  } finally {
    btn.disabled = false
    btn.textContent = 'Delete All Results'
  }
}

async function syncAthleticNet() {
  const btn = document.getElementById('sync-anet-btn')
  const meta = document.getElementById('sync-meta')
  btn.disabled = true
  btn.textContent = 'Syncing…'
  meta.textContent = 'Fetching from Athletic.net…'
  try {
    const resp = await fetch(SYNC_ANET_URL, {
      method: 'POST',
      headers: { Authorization: `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
    })
    const json = await resp.json()
    console.log('Athletic.net sync response:', JSON.stringify(json, null, 2))
    if (json.ok) {
      meta.textContent = 'Sync complete — reloading…'
      await load()
    } else {
      meta.textContent = 'Sync error — check console'
      console.error(json)
    }
  } catch (e) {
    meta.textContent = 'Sync failed: ' + e.message
    console.error('Sync exception:', e)
  } finally {
    btn.disabled = false
    btn.textContent = 'Sync Athletic.net'
  }
}

load()
</script>
</body>
</html>
