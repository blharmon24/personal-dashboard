<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Management</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root {
  --bg:#0f1117; --surface:#1a1d27; --surface2:#232635; --accent:#4f8ef7;
  --text:#e2e8f0; --text-muted:#94a3b8; --border:#2d3250;
  --positive:#4ade80; --negative:#f87171; --warn:#fbbf24;
}
[data-theme="light"] {
  --bg:#f0f2f5; --surface:#ffffff; --surface2:#e8edf3; --accent:#2563eb;
  --text:#1e293b; --text-muted:#64748b; --border:#cbd5e1;
  --positive:#16a34a; --negative:#dc2626; --warn:#d97706;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh;}

/* LOGIN */
#login-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:36px 40px;width:360px;}
.login-box h2{font-size:1.2rem;margin-bottom:4px;}
.login-box p{color:var(--text-muted);font-size:12px;margin-bottom:24px;}
#login-error{color:var(--negative);font-size:12px;margin-top:10px;min-height:16px;}

/* FORMS */
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;font-size:13px;font-family:inherit;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:2px solid var(--accent);border-color:var(--accent);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:6px;font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;border:none;transition:opacity .15s;}
.btn-primary{background:var(--accent);color:#fff;} .btn-primary:hover{opacity:.88;}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{border-color:var(--accent);}
.btn-danger{background:var(--negative);color:#fff;}
.btn-full{width:100%;justify-content:center;}
.btn-sm{padding:4px 10px;font-size:11px;}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;}
header h1{font-size:1.05rem;font-weight:600;flex:1;}
.header-user{font-size:11px;color:var(--text-muted);}
.version{font-size:11px;color:var(--text-muted);}
.back-link{display:inline-flex;align-items:center;color:var(--text-muted);text-decoration:none;padding:4px;}
.back-link:hover{color:var(--text);}
.theme-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:13px;}

/* STATS BAR */
.stats-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;gap:0;flex-wrap:wrap;overflow-x:auto;}
.stat-item{display:flex;flex-direction:column;gap:2px;padding:0 20px;}
.stat-item:first-child{padding-left:0;}
.stat-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;white-space:nowrap;}
.stat-val{font-size:1.1rem;font-weight:700;white-space:nowrap;}
.stat-tenants-val{font-size:12px;line-height:1.7;max-width:500px;white-space:normal;}
.stat-divider{width:1px;background:var(--border);align-self:stretch;flex-shrink:0;}
.c-pos{color:var(--positive);} .c-neg{color:var(--negative);}

/* MAIN */
.main{padding:20px 24px;}
.main-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.main-toolbar h2{font-size:14px;font-weight:600;color:var(--text-muted);}

/* PROPERTY CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.prop-card{background:var(--surface);border:2px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .15s,box-shadow .15s;text-decoration:none;display:block;color:inherit;}
.prop-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.3);}
.prop-card.s-paid{border-color:var(--positive);}
.prop-card.s-warn{border-color:var(--warn);}
.prop-card.s-late{border-color:var(--negative);}
.prop-card.s-sold{opacity:.5;pointer-events:auto;}
.sold-overlay{position:absolute;top:10px;right:10px;background:var(--text-muted);color:var(--bg);font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;letter-spacing:.06em;}
.card-photo{position:relative;}

.card-photo{width:100%;height:180px;object-fit:cover;background:var(--surface2);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.card-photo img{width:100%;height:100%;object-fit:cover;}
.no-photo-label{color:var(--text-muted);font-size:12px;display:flex;flex-direction:column;align-items:center;gap:8px;}
.card-body{padding:14px;}
.card-address{font-size:14px;font-weight:600;margin-bottom:3px;line-height:1.3;}
.card-sub{font-size:12px;color:var(--text-muted);margin-bottom:10px;}
.card-footer{display:flex;align-items:center;justify-content:space-between;}
.card-rent{font-size:13px;font-weight:600;}
.card-paid-info{font-size:11px;color:var(--text-muted);margin-top:5px;}

.status-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:.05em;}
.sb-paid{background:rgba(74,222,128,.15);color:var(--positive);}
.sb-partial{background:rgba(251,191,36,.15);color:var(--warn);}
.sb-warn{background:rgba(251,191,36,.2);color:var(--warn);}
.sb-late{background:rgba(248,113,113,.15);color:var(--negative);}
.sb-current{background:var(--surface2);color:var(--text-muted);}
.sb-vacant{background:var(--surface2);color:var(--text-muted);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal-overlay.hidden{display:none;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.modal-header h3{font-size:1rem;font-weight:600;}
.modal-close{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;line-height:1;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
.modal-error{color:var(--negative);font-size:12px;margin-top:8px;min-height:16px;}

/* PHOTO UPLOAD */
.photo-upload-area{border:2px dashed var(--border);border-radius:8px;padding:20px;text-align:center;cursor:pointer;transition:border-color .15s;}
.photo-upload-area:hover{border-color:var(--accent);}
.photo-upload-area p{color:var(--text-muted);font-size:12px;margin-top:6px;}
.photo-preview{width:100%;height:140px;object-fit:cover;border-radius:6px;display:none;}

/* OVERVIEW TABLE */
.overview-wrap{overflow-x:auto;}
.ov-table{width:100%;border-collapse:collapse;white-space:nowrap;}
.ov-table th{font-size:10px;font-weight:600;color:var(--text-muted);padding:8px 6px;text-transform:uppercase;letter-spacing:.04em;text-align:center;border-bottom:1px solid var(--border);background:var(--surface);}
.ov-table th.addr-col{text-align:left;padding-left:16px;min-width:160px;}
.ov-table td{padding:6px 4px;text-align:center;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;}
.ov-table td.addr-col{text-align:left;padding-left:16px;font-size:12px;color:var(--text);font-weight:400;}
.ov-table tbody tr:last-child td{border-bottom:none;}
.ov-table tbody tr:hover td{background:rgba(255,255,255,.03);}
[data-theme="light"] .ov-table tbody tr:hover td{background:rgba(0,0,0,.02);}
.ov-paid{background:rgba(74,222,128,.15);color:var(--positive);}
.ov-partial{background:rgba(251,191,36,.15);color:var(--warn);}
.ov-late{background:rgba(248,113,113,.15);color:var(--negative);}
.ov-vacant{color:var(--text-muted);}
.ov-none{color:var(--border);}
.view-toggle{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.view-toggle button{background:none;border:none;padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit;color:var(--text-muted);}
.view-toggle button.active{background:var(--accent);color:#fff;}

/* LOADING / EMPTY */
.loading{padding:40px;text-align:center;color:var(--text-muted);}
.empty-state{padding:60px 20px;text-align:center;color:var(--text-muted);}
.empty-state h3{font-size:1rem;margin-bottom:8px;color:var(--text);}
</style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div id="login-overlay">
  <div class="login-box">
    <h2>Property Management</h2>
    <p>Sign in to access the dashboard</p>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="email@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary btn-full" onclick="doLogin()">Sign In</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<header>
  <a href="index.html" class="back-link" title="Dashboard">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
  </a>
  <h1>Property Management</h1>
  <span class="version">v2026.04.26.26</span>
  <span class="header-user" id="header-user"></span>
  <button class="btn btn-secondary btn-sm" onclick="doLogout()">Sign Out</button>
  <button class="theme-btn" id="theme-toggle">🌙</button>
</header>

<div class="stats-bar">
  <div class="stat-item">
    <span class="stat-label">Properties</span>
    <span class="stat-val" id="s-props">—</span>
  </div>
  <div class="stat-divider"></div>
  <div class="stat-item">
    <span class="stat-label">Collected This Month</span>
    <span class="stat-val c-pos" id="s-collected">—</span>
  </div>
  <div class="stat-divider"></div>
  <div class="stat-item">
    <span class="stat-label">Outstanding</span>
    <span class="stat-val" id="s-outstanding">—</span>
  </div>
  <div class="stat-divider"></div>
  <div class="stat-item">
    <span class="stat-label">Expenses This Month</span>
    <span class="stat-val" id="s-expenses">—</span>
  </div>
  <div class="stat-divider"></div>
  <div class="stat-item">
    <span class="stat-label">Current Tenants</span>
    <span class="stat-val stat-tenants-val" id="s-tenants">—</span>
  </div>
</div>

<div class="main">
  <div class="main-toolbar">
    <h2 id="prop-count-label">Properties</h2>
    <div style="display:flex;gap:8px;align-items:center;">
      <div class="view-toggle">
        <button id="view-cards-btn" class="active" onclick="setView('cards')">Cards</button>
        <button id="view-overview-btn" onclick="setView('overview')">Overview</button>
      </div>
      <button class="btn btn-secondary btn-sm" id="sold-toggle" onclick="toggleSold()">Show Sold</button>
      <button class="btn btn-primary" onclick="openAddModal()">+ Add Property</button>
    </div>
  </div>
  <div class="cards-grid" id="cards-grid">
    <div class="loading">Loading…</div>
  </div>
  <div id="overview-container" style="display:none;"></div>
</div>

</div><!-- #app -->

<!-- ADD PROPERTY MODAL -->
<div class="modal-overlay hidden" id="add-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>Add Property</h3>
      <button class="modal-close" onclick="closeAddModal()">✕</button>
    </div>
    <div class="form-group">
      <label>Street Address *</label>
      <input type="text" id="n-address" placeholder="123 Main St">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>City</label>
        <input type="text" id="n-city">
      </div>
      <div class="form-row" style="gap:8px;">
        <div class="form-group">
          <label>State</label>
          <input type="text" id="n-state" maxlength="2" placeholder="UT">
        </div>
        <div class="form-group">
          <label>Zip</label>
          <input type="text" id="n-zip" maxlength="10">
        </div>
      </div>
    </div>
    <div class="form-group">
      <label>Property Photo</label>
      <div class="photo-upload-area" onclick="document.getElementById('n-photo').click()">
        <img id="n-photo-preview" class="photo-preview" alt="preview">
        <div id="n-photo-placeholder">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".4"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <p>Click to upload a photo</p>
        </div>
      </div>
      <input type="file" id="n-photo" accept="image/*" style="display:none" onchange="previewPhoto('n-photo','n-photo-preview','n-photo-placeholder')">
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="n-notes" rows="2" style="resize:vertical"></textarea>
    </div>
    <div class="modal-error" id="add-modal-err"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-primary" id="add-prop-btn" onclick="addProperty()">Add Property</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://ebdsxcbpnhevzkbpdxry.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_2chleZ28vhYAQqpW0RaNeg_0DYo_1v4';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Theme
const themeToggle = document.getElementById('theme-toggle');
function applyTheme(t) {
  document.documentElement.dataset.theme = t === 'light' ? 'light' : '';
  themeToggle.textContent = t === 'light' ? '☀️' : '🌙';
}
applyTheme(localStorage.getItem('theme') || 'dark');
themeToggle.addEventListener('click', () => {
  const next = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
  localStorage.setItem('theme', next);
  applyTheme(next);
});

// Auth
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  const { error } = await db.auth.signInWithPassword({ email, password: pw });
  if (error) { errEl.textContent = error.message; return; }
  showApp();
}
document.getElementById('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doLogout() {
  await db.auth.signOut();
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-overlay').style.display = 'flex';
}

async function showApp() {
  const { data: { session } } = await db.auth.getSession();
  if (!session) return;
  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('header-user').textContent = session.user.email;
  loadData();
}

(async () => {
  const { data: { session } } = await db.auth.getSession();
  if (session) showApp();
})();

// Data
let allProps = [], allTenants = [], monthPays = [], monthExps = [], allPayments12Mo = [], showSold = false, currentView = 'cards';

function monthStart() {
  const t = new Date();
  return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-01`;
}
function nextMonthStart() {
  const t = new Date();
  const n = new Date(t.getFullYear(), t.getMonth()+1, 1);
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-01`;
}
function dollar(n) {
  return '$' + Number(n||0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function start12Mo() {
  const d = new Date(); d.setMonth(d.getMonth() - 11); d.setDate(1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
}

async function loadData() {
  const ms = monthStart(), nms = nextMonthStart();
  const [p, t, pay, exp, pay12] = await Promise.all([
    db.from('pm_properties').select('*').order('address'),
    db.from('pm_tenants').select('*').eq('is_active', true),
    db.from('pm_payments').select('*').eq('for_month', ms),
    db.from('pm_expenses').select('*').gte('expense_date', ms).lt('expense_date', nms),
    db.from('pm_payments').select('property_id, amount, for_month, payment_type').gte('for_month', start12Mo())
  ]);
  allProps = p.data || [];
  allTenants = t.data || [];
  monthPays = pay.data || [];
  monthExps = exp.data || [];
  allPayments12Mo = pay12.data || [];
  renderStats();
  if (currentView === 'cards') renderCards();
  else renderOverview();
}

function tenantFor(propId) { return allTenants.find(t => t.property_id === propId) || null; }
function paysFor(propId) { return monthPays.filter(p => p.property_id === propId); }

function cardStatus(tenant, pays) {
  if (!tenant) return 'vacant';
  const rentPays = pays.filter(p => !p.payment_type || p.payment_type === 'Rent');
  const paid = rentPays.reduce((s,p) => s + parseFloat(p.amount||0), 0);
  const due = parseFloat(tenant.monthly_rent||0);
  if (paid >= due && due > 0) return 'paid';
  const day = new Date().getDate();
  if (day >= 7) return 'late';
  if (day >= 5) return 'warn';
  return paid > 0 ? 'partial' : 'current';
}

function renderStats() {
  const activeProps = allProps.filter(p => !p.is_sold);
  const activePropIds = new Set(activeProps.map(p => p.id));
  const activeTenantsForStats = allTenants.filter(t => activePropIds.has(t.property_id));
  const expected = activeTenantsForStats.reduce((s,t) => s + parseFloat(t.monthly_rent||0), 0);
  const activePays = monthPays.filter(p => activePropIds.has(p.property_id));
  const collected = activePays.reduce((s,p) => s + parseFloat(p.amount||0), 0);
  const rentCollected = activePays.filter(p => !p.payment_type || p.payment_type === 'Rent').reduce((s,p) => s + parseFloat(p.amount||0), 0);
  const outstanding = Math.max(0, expected - rentCollected);
  const expenses = monthExps.filter(e => activePropIds.has(e.property_id)).reduce((s,e) => s + parseFloat(e.amount||0), 0);
  const names = activeTenantsForStats.map(t => `${t.first_name[0]}. ${t.last_name}`).sort().join('  ·  ');
  const soldCount = allProps.filter(p => p.is_sold).length;
  document.getElementById('s-props').textContent = activeProps.length;
  document.getElementById('s-collected').textContent = dollar(collected);
  const outEl = document.getElementById('s-outstanding');
  outEl.textContent = dollar(outstanding);
  outEl.className = 'stat-val ' + (outstanding > 0 ? 'c-neg' : 'c-pos');
  document.getElementById('s-expenses').textContent = dollar(expenses);
  document.getElementById('s-tenants').textContent = names || '—';
  const soldBtn = document.getElementById('sold-toggle');
  if (soldBtn) {
    soldBtn.textContent = showSold ? `Hide Sold (${soldCount})` : `Show Sold (${soldCount})`;
    soldBtn.style.display = soldCount > 0 ? '' : 'none';
  }
  const visibleCount = showSold ? allProps.length : activeProps.length;
  document.getElementById('prop-count-label').textContent = `${visibleCount} Propert${visibleCount===1?'y':'ies'}`;
}

function setView(v) {
  currentView = v;
  document.getElementById('view-cards-btn').classList.toggle('active', v === 'cards');
  document.getElementById('view-overview-btn').classList.toggle('active', v === 'overview');
  document.getElementById('cards-grid').style.display = v === 'cards' ? '' : 'none';
  document.getElementById('overview-container').style.display = v === 'overview' ? '' : 'none';
  if (v === 'overview') renderOverview();
  else renderCards();
}

function getLast12Months() {
  const months = [];
  const now = new Date();
  for (let i = 11; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push({
      key:   `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`,
      label: d.toLocaleDateString('en-US', { month: 'short', year: '2-digit' })
    });
  }
  return months;
}

function curMonthKey() {
  const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

function ovCellStatus(prop, monthKey, tenant) {
  const mk = monthKey.substring(0, 7);
  const rentPaid = allPayments12Mo
    .filter(p => p.property_id === prop.id && p.for_month && p.for_month.substring(0,7) === mk && (!p.payment_type || p.payment_type === 'Rent'))
    .reduce((s, p) => s + parseFloat(p.amount||0), 0);

  if (!tenant) {
    return rentPaid > 0 ? { cls:'ov-paid', txt:'PAID' } : { cls:'ov-vacant', txt:'VAC' };
  }

  const moveIn = tenant.move_in_date ? tenant.move_in_date.substring(0,7) : null;
  if (moveIn && mk < moveIn) return rentPaid > 0 ? { cls:'ov-paid', txt:'PAID' } : { cls:'ov-none', txt:'—' };

  const due = parseFloat(tenant.monthly_rent || 0);
  if (due > 0 && rentPaid >= due) return { cls:'ov-paid', txt:'PAID' };
  if (rentPaid > 0) return { cls:'ov-partial', txt:'PART' };

  const cur = curMonthKey();
  if (mk < cur) return { cls:'ov-late', txt:'LATE' };
  const day = new Date().getDate();
  if (day >= 7) return { cls:'ov-late', txt:'LATE' };
  if (day >= 5) return { cls:'ov-partial', txt:'DUE' };
  return { cls:'ov-none', txt:'—' };
}

function renderOverview() {
  const months = getLast12Months();
  const visible = showSold ? allProps : allProps.filter(p => !p.is_sold);
  const container = document.getElementById('overview-container');
  if (!visible.length) { container.innerHTML = '<div class="empty-state"><h3>No properties</h3></div>'; return; }
  container.innerHTML = `<div class="overview-wrap"><div class="table-wrap">
    <table class="ov-table">
      <thead><tr>
        <th class="addr-col">Property</th>
        ${months.map(m => `<th>${m.label}</th>`).join('')}
      </tr></thead>
      <tbody>${visible.map(prop => {
        if (prop.is_sold) {
          return `<tr><td class="addr-col" style="color:var(--text-muted)">${prop.address} <span style="font-size:10px;">(SOLD)</span></td>${months.map(() => `<td class="ov-none">—</td>`).join('')}</tr>`;
        }
        const t = tenantFor(prop.id);
        return `<tr>
          <td class="addr-col"><a href="property-detail.html?id=${prop.id}" style="color:var(--text);text-decoration:none;">${prop.address}</a></td>
          ${months.map(m => { const s = ovCellStatus(prop, m.key, t); return `<td class="${s.cls}">${s.txt}</td>`; }).join('')}
        </tr>`;
      }).join('')}</tbody>
    </table>
  </div></div>`;
}

function toggleSold() { showSold = !showSold; renderStats(); if (currentView === 'cards') renderCards(); else renderOverview(); }

function renderCards() {
  const grid = document.getElementById('cards-grid');
  const visible = showSold ? allProps : allProps.filter(p => !p.is_sold);
  if (!visible.length) {
    grid.innerHTML = '<div class="empty-state"><h3>No properties yet</h3><p>Click "Add Property" to get started.</p></div>';
    return;
  }
  grid.innerHTML = visible.map(prop => {
    if (prop.is_sold) {
      const photoHtml = prop.photo_url
        ? `<img src="${prop.photo_url}" alt="${prop.address}" loading="lazy">`
        : `<div class="no-photo-label"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".3"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>No photo</span></div>`;
      return `<a class="prop-card s-sold" href="property-detail.html?id=${prop.id}">
        <div class="card-photo">${photoHtml}<span class="sold-overlay">SOLD</span></div>
        <div class="card-body">
          <div class="card-address">${prop.address}</div>
          <div class="card-sub">${[prop.city, prop.state].filter(Boolean).join(', ') || ''}</div>
          <div class="card-footer"><span class="card-rent" style="color:var(--text-muted)">${prop.sold_date ? 'Sold ' + new Date(prop.sold_date + 'T12:00:00').toLocaleDateString('en-US',{month:'short',year:'numeric'}) : 'Sold'}</span></div>
        </div>
      </a>`;
    }
    const tenant = tenantFor(prop.id);
    const pays = paysFor(prop.id);
    const status = cardStatus(tenant, pays);
    const paid = pays.reduce((s,p) => s + parseFloat(p.amount||0), 0);
    const tenantName = tenant ? `${tenant.first_name[0]}. ${tenant.last_name}` : 'Vacant';
    const rentStr = tenant ? dollar(tenant.monthly_rent) + '/mo' : '—';
    const statusCls = status === 'paid' ? 's-paid' : status === 'warn' ? 's-warn' : status === 'late' ? 's-late' : '';
    const badges = { paid:'<span class="status-badge sb-paid">PAID</span>', partial:'<span class="status-badge sb-partial">PARTIAL</span>', warn:'<span class="status-badge sb-warn">DUE</span>', late:'<span class="status-badge sb-late">LATE</span>', current:'<span class="status-badge sb-current">CURRENT</span>', vacant:'<span class="status-badge sb-vacant">VACANT</span>' };
    const photoHtml = prop.photo_url
      ? `<img src="${prop.photo_url}" alt="${prop.address}" loading="lazy">`
      : `<div class="no-photo-label"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".3"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>No photo</span></div>`;
    const paidLine = tenant ? `<div class="card-paid-info">${dollar(paid)} of ${dollar(tenant.monthly_rent)} paid this month</div>` : '';
    return `<a class="prop-card ${statusCls}" href="property-detail.html?id=${prop.id}">
      <div class="card-photo">${photoHtml}</div>
      <div class="card-body">
        <div class="card-address">${prop.address}</div>
        <div class="card-sub">${[prop.city, prop.state].filter(Boolean).join(', ') || ''} &nbsp; ${tenantName}</div>
        <div class="card-footer"><span class="card-rent">${rentStr}</span>${badges[status]||''}</div>
        ${paidLine}
      </div>
    </a>`;
  }).join('');
}

// Add modal
function openAddModal() { document.getElementById('add-modal').classList.remove('hidden'); }
function closeAddModal() {
  document.getElementById('add-modal').classList.add('hidden');
  ['n-address','n-city','n-state','n-zip','n-notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('n-photo').value = '';
  document.getElementById('n-photo-preview').style.display = 'none';
  document.getElementById('n-photo-placeholder').style.display = 'block';
  document.getElementById('add-modal-err').textContent = '';
}

function previewPhoto(inputId, previewId, placeholderId) {
  const file = document.getElementById(inputId).files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById(previewId);
    img.src = e.target.result;
    img.style.display = 'block';
    document.getElementById(placeholderId).style.display = 'none';
  };
  reader.readAsDataURL(file);
}

async function addProperty() {
  const address = document.getElementById('n-address').value.trim();
  const errEl = document.getElementById('add-modal-err');
  if (!address) { errEl.textContent = 'Address is required.'; return; }
  const btn = document.getElementById('add-prop-btn');
  btn.textContent = 'Saving…'; btn.disabled = true; errEl.textContent = '';

  const { data: prop, error } = await db.from('pm_properties').insert({
    address,
    city:  document.getElementById('n-city').value.trim()  || null,
    state: document.getElementById('n-state').value.trim() || null,
    zip:   document.getElementById('n-zip').value.trim()   || null,
    notes: document.getElementById('n-notes').value.trim() || null,
  }).select().single();

  if (error) { errEl.textContent = error.message; btn.textContent = 'Add Property'; btn.disabled = false; return; }

  const photoFile = document.getElementById('n-photo').files[0];
  if (photoFile) {
    const ext = photoFile.name.split('.').pop();
    const path = `${prop.id}/photo.${ext}`;
    const { error: upErr } = await db.storage.from('pm-photos').upload(path, photoFile, { upsert: true });
    if (!upErr) {
      const { data: { publicUrl } } = db.storage.from('pm-photos').getPublicUrl(path);
      await db.from('pm_properties').update({ photo_url: publicUrl }).eq('id', prop.id);
    }
  }

  btn.textContent = 'Add Property'; btn.disabled = false;
  closeAddModal();
  loadData();
}
</script>
